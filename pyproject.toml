[project]
name = "languaage"
version = "0.1.0"
description = "A Python project generated by Python Initializr"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "alembic>=1.18.4",
    "fastapi",
    "pydantic-settings>=2.14.0",
    "pydantic[email]>=2.13.3",
    "sqlalchemy>=2.0.49",
    "uvicorn>=0.46.0",
]


[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
